- party: greens
  assessed: true
  date: "April 2026"
  source_url: "https://ifs.org.uk/articles/initial-response-scottish-greens-manifesto"
  verdict: "A large manifesto proposing huge changes, but **the tax plans seem unlikely to raise enough revenue** to fund all the additional spending proposed — meaning even larger tax rises or cuts to lower-priority spending would be needed. Scotland's position as **the highest-taxed part of the UK** would be cemented, and **whether plans could be delivered over a parliament is far from clear.**"
  themes:
    - title: "Property taxation"
      summary: "Reform of council tax is genuinely welcome — replacing regressive 1991 valuations with a proportional property tax would raise around **£1.3–1.5bn a year** and is **good tax design**. In contrast, further increases to LBTT are **economically damaging**: it discourages beneficial transactions, makes it harder to move for work or family, and is **a tax that should be reduced, not made bigger.**"
    - title: "Fiscal credibility"
      summary: "It is welcome that the Greens pair large spending commitments with a recognition that higher revenues are needed. However, **the revenue proposals appear to fall short** of what the spending plans would cost, and big tax rises to fund new universal entitlements would make **further increases — likely needed to maintain existing services — even harder to deliver.**"
    - title: "Families & childcare"
      summary: "Large increases proposed to the Scottish child payment (rising to **£55/week per child by 2030**) would reduce child poverty but **significantly weaken work incentives** — particularly given the cliff-edge structure where **a £1 rise in earnings can remove the entire payment.** Childcare expansion plans are ambitious, though costings assume full take-up and do not fully account for cost inflation."
    - title: "Public services"
      summary: "Plans include free bus travel for all, free dental care, free non-residential social care, and a major boost to GP numbers (**from 0.65 to 1 per 1,000 people — a very large increase**). External costings are based on data several years old — **true costs are likely higher.** Whether this scale of service expansion could be delivered within a single parliament is unclear."
    - title: "Tax complexity"
      summary: "The manifesto proposes a wide range of new taxes, including a stadium levy and tourism point-of-entry levy. While some reforms address genuine distortions, **the net effect would be a significant increase in the complexity of the Scottish tax system**, with consequences for businesses and the wider economy."

- party: reform
  assessed: true
  date: "April 2026"
  source_url: "https://ifs.org.uk/articles/initial-response-reform-uk-scotland-manifesto"
  verdict: "Plans for income tax cuts costing **up to £4 billion a year** are the headline commitment, but the claimed self-funding mechanism is **a mirage** created by misunderstanding the devolution settlement and incorrectly comparing cumulative and annual figures. The combination of big tax cuts and implied benefit increases **without any identified source of funding is not fiscally credible**, and the analysis underpinning the flagship policy is, in IFS's words, **'unserious at best.'**"
  themes:
    - title: "Income tax cuts"
      summary: "Initial cuts would set each Scottish income tax rate **1 percentage point below the rest of the UK**, costing around **£2.3 billion a year** by 2030, rising to £4 billion if the full ambition (3 points below rUK) is achieved. The gains are **heavily skewed to high earners**: someone on the National Living Wage (£24,785) would save at most £80/year; someone on £50,000 saves £1,900; someone on £125,000 saves £6,400."
    - title: "The self-funding claim"
      summary: "The manifesto claims the tax cuts would pay for themselves via economic growth — IFS concludes this is **wrong in two distinct ways.** First, behavioural responses are already incorporated in the cost estimates. Second, **the £2 billion cost is annual, not a one-off** — so even an £8 billion cumulative gain over 10 years would not cover it. Compounding the error: because only around a third of taxes are devolved, a 1% earnings boost would generate only **~£300 million a year** for the Scottish budget — not the figures cited. IFS calls the analysis **'not good enough.'**"
    - title: "Marginal tax rates"
      summary: "Reform UK rightly highlights that some people face **very high effective marginal tax rates**, including cliff-edges where earning £1 more can remove thousands in benefits. The concrete proposal to taper carers' benefits more smoothly is **feasible, albeit at a cost.** However, addressing the broader pledge that no-one should face a marginal rate above 50% — especially for those on Universal Credit — **would require top-ups to benefit payments for many low- and middle-income families**, pushing up Scottish benefit spending rather than reducing it."
    - title: "Property tax reform"
      summary: "Reform UK is **right that LBTT and business rates have serious flaws** and should be reformed. But the proposed annual property tax replacement has significant shortcomings: pre-announcing LBTT reductions would **freeze the property market** as buyers delay purchases, and the plan to **end regular property revaluations** misunderstands how business rates work — revaluations are a feature, not a bug, of a well-functioning property tax."
    - title: "Public services"
      summary: "Despite listing 'fixing our NHS' as its first priority, the manifesto **provides no spending detail or policy initiatives** that would deliver meaningful improvements — a post-election commission is proposed instead. On schools, curriculum reform and greater testing could have benefits. On local government, a review of statutory duties is worthwhile, but the **fundamental problem — growing social care costs and falling funding — cannot be resolved** within the constraints of Reform UK's tax cut plans."
