# IFS (Institute for Fiscal Studies) initial responses to Scottish Parliament 2026 manifestos
# Source: https://ifs.org.uk/scottish-election-2026
#
# assessed: true/false — whether IFS has published a response yet
# verdict: 2–3 sentence overall judgement
# themes: key findings by topic area
# source_url: link to the IFS article
# date: date IFS published the response

