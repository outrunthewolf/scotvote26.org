- party: labour
  assessed: true
  date: "April 2026"
  source_url: "https://ifs.org.uk/articles/initial-response-scottish-labour-manifesto"
  verdict: "A **notably restrained** manifesto — no big tax cuts or expansions of entitlements, with most spending pledged from within existing budgets. The **lack of big unfunded commitments is fiscally welcome** given Scotland's challenging position. But delivering the targeted improvements to public services with constrained funding would still require **cuts elsewhere, tax rises, or productivity gains** — and whether that proves possible is less clear."
  themes:
    - title: "Fiscal approach"
      summary: "Compared with every other party, this is a **pared-back offering**: no large new entitlements, no unfunded tax cuts. Most spending pledges represent **small changes** to how money is already planned to be spent. This means **fewer obvious winners** but also fewer losers from measures needed to pay for giveaways — and more of Scotland's constrained funding available for existing services."
    - title: "Taxation"
      summary: "No further income tax rises are committed to, though **existing threshold freezes through 2028–29 remain in place**. An aspiration to cut the highest marginal income tax rates is noted, but it is **explicitly contingent** on economic and fiscal conditions — making it difficult to deliver. On council tax, Labour's position amounts to **the same deferral as the SNP**: no firm promise, and a 'consensus' requirement that risks reform never happening."
    - title: "Families & childcare"
      summary: "The main policy — a Scottish top-up to tax-free childcare, **raising the government subsidy from 25p to 37.5p per £1** — helps a wider age range than rival parties' funded hours proposals, but remains a partial subsidy that **blunts cost-of-living benefits**. Beyond this, there is **little new cash support for families with children**, well short of what would be needed to meet Scotland's statutory child poverty targets."
    - title: "Public services"
      summary: "Health and social care is committed to **at least £25 billion by 2030–31**, implying real-terms growth of just 1.4% a year — meaning spending would **barely increase at all** in the latter years of the parliament. Plans for 2,000 recovery teachers and 1,500 classroom assistants are intended to be funded from within existing budgets, but **that money is likely needed for the NHS**. Delivering large improvements to services within these constraints would be difficult."

- party: conservative
  assessed: true
  date: "April 2026"
  source_url: "https://ifs.org.uk/articles/initial-response-scottish-conservative-manifesto"
  verdict: "Tax cuts and spending increases totalling **almost £6 billion a year by 2031–32** are costed on paper — but **whether the package would survive contact with reality is far from clear.** The nearly £4 billion a year expected from back-office and administrative savings is **not credible at that scale** without cuts to front-line services. Scotland can have lower taxes and higher spending on some services, but **giveaways of this scale cannot credibly be funded largely through back-office savings.**"
  themes:
    - title: "Fiscal credibility"
      summary: "The costs of new measures are set out clearly — **a welcome level of transparency** — but the funding side does not hold up to scrutiny. **Almost £4 billion a year** is expected from back-office and administration savings by 2031–32, equivalent to over 7% of projected Scottish public services spending. This comes **on top of savings already assumed** in the existing Spending Review. History is replete with missed targets for savings of this kind, necessitating tax rises or cuts to front-line services instead."
    - title: "Income tax & business rates"
      summary: "Proposed income tax cuts would **benefit all Scottish taxpayers**, with gains rising sharply with income — around £200/year at £15,000 income, rising to **£1,660/year for anyone above the higher-rate threshold.** Total cost: **almost £3 billion a year by 2031–32.** The move to a single marginal rate below the higher-rate threshold would be a **welcome simplification.** Business rates cuts (£0.7bn/year) also include sensible structural reforms, though permanently lower rates for specific sectors is less clearly justified."
    - title: "Disability benefits cuts"
      summary: "The plan to tighten eligibility for adult disability payments (ADP) for those with mental health conditions is **concrete, not vague** — a distinction from other parties. But the **£1.8 billion a year** savings estimated by 2030–31 (34% of forecast ADP spending) are highly uncertain. The costings assume few claimants would seek medical diagnoses to qualify; the OBR assumed behavioural responses would **halve** equivalent UK-level savings. IFS judges that **savings would likely be lower than assumed.**"
    - title: "Childcare & child payment"
      summary: "Childcare expansion to cover working families from **9 months onwards** mirrors English reforms, but the **majority of beneficiaries would be families who would have worked and paid for childcare anyway** — making this primarily a cost-of-living subsidy rather than a measure that changes work incentives or child outcomes. Restricting the Scottish child payment to two children would strengthen work incentives but **increase child poverty in larger families**, which already have substantially higher poverty rates."
    - title: "Public services"
      summary: "An extra **£350 million for the NHS in 2028–29**, rising to an assumed £1 billion by 2031–32, should help improve services — though the challenge of meeting all the manifesto's health objectives **should not be underestimated.** Schools proposals focus on knowledge-based curriculum reform, increased testing and discipline — similar to Reform UK's approach. Significant new spending on adult education and apprenticeships (**£260 million a year by 2031–32**) is among the more distinctive positive commitments."

