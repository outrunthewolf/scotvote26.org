# Policy comparison data
# status options:
#   committed   — confirmed manifesto commitment
#   opposed     — explicitly opposed
#   partial     — partial or conditional support
#   tbc         — not yet announced / manifesto not released
#
# summary: plain-English description (null if tbc)
# Party IDs: snp, labour, conservative, libdem, greens, reform

- area: Economy & Jobs
  icon: "💼"
  id: economy
  policies:
    - party: snp
      status: committed
      summary: "Make Scotland the best place in Europe to start and scale a business, with a new 'High Growth Unit' for unicorn-scale companies. 150,000 apprenticeships over the parliament, including 8,000+ graduate apprenticeships."
    - party: labour
      status: committed
      summary: "9,000 new apprenticeships and a new industrial strategy. Plans to replace business rates and create a Scottish Treasury."
    - party: conservative
      status: committed
      summary: "A 'growth test' for every government policy. Enterprise-style zones, cut red tape and lower business rates to attract investment."
    - party: libdem
      status: tbc
      summary: null
    - party: greens
      status: committed
      summary: "Tax wealth and polluting industries to fund public services. Establish regional green skills hubs linking colleges, employers and unions."
    - party: reform
      status: committed
      summary: "Slash quangos to save £7.5bn and return powers to ministers. Cut spending to grow the private sector."

- area: Health & NHS
  icon: "🏥"
  id: health
  policies:
    - party: snp
      status: committed
      summary: "At least £10 billion in capital investment over ten years and £200 million annually to tackle waiting times. End the 8am GP rush with walk-in clinics across Scotland, open 7 days a week."
    - party: labour
      status: committed
      summary: "End the 8am rush for GP appointments and bring back the 'family doctor'. Speed up rollout of an NHS app, invest in AI-enabled scanners and use all available NHS capacity to cut waiting times."
    - party: conservative
      status: committed
      summary: "Guarantee a GP appointment within 48 hours. £350m extra NHS funding above inflation. Bring back recently retired doctors and nurses to reduce waiting lists."
    - party: libdem
      status: partial
      summary: "Campaign priority: ensure everyone can see a GP, dentist or mental health professional in their local community when they need one."
    - party: greens
      status: tbc
      summary: null
    - party: reform
      status: committed
      summary: "NHS to remain free at the point of need. Establish an independent Scottish Healthcare Reform Commission to develop a workforce plan, train more nurses and solve delayed discharge."

- area: Education
  icon: "🎓"
  id: education
  policies:
    - party: snp
      status: committed
      summary: "Maintain the best pupil-teacher ratio in the UK and legislate for a national mobile phone ban in all classrooms. A Teacher Jobs Guarantee of minimum 3 years for newly qualified teachers."
    - party: labour
      status: committed
      summary: "Up to 2,000 specialist education recovery teachers. Breakfast clubs in all primary schools, ban mobile phones in classrooms, more classroom assistants and two weeks of funded summer holiday clubs."
    - party: conservative
      status: committed
      summary: "Raise educational standards, increase classroom assistants and ban mobile phones. Support for teachers as a priority."
    - party: libdem
      status: tbc
      summary: null
    - party: greens
      status: tbc
      summary: null
    - party: reform
      status: committed
      summary: "Scrap Education Scotland. Move to a knowledge-based curriculum and restore exams, reversing what the party calls a decade of declining standards."

- area: Housing
  icon: "🏠"
  id: housing
  policies:
    - party: snp
      status: committed
      summary: "Record £4.9 billion investment in affordable house building over four years, targeting 110,000 affordable homes by 2032. A First Homes Fund of £100 million a year offering up to £10,000 deposit support for first-time buyers."
    - party: labour
      status: committed
      summary: "125,000 new homes by 2031, including more than 50,000 affordable. A dedicated Housing Bank to direct investment. LBTT relief threshold raised to £200,000 for first-time buyers."
    - party: conservative
      status: committed
      summary: "80,000 affordable homes over the next five years. Abolish LBTT on primary residences entirely. Opposes rent controls."
    - party: libdem
      status: tbc
      summary: null
    - party: greens
      status: committed
      summary: "All new homes must meet net-zero standards. Strengthen rent controls by removing exemptions for mid-market and build-to-rent properties. Four-month notice period for evictions and ban on evictions for sale or owner-occupation in the first 12 months."
    - party: reform
      status: committed
      summary: "Target 75,000 affordable homes over five years."

- area: Environment & Climate
  icon: "🌿"
  id: environment
  policies:
    - party: snp
      status: committed
      summary: "End Scotland's contribution to climate change by 2045 in a just and fair way, backed by a £500 million Just Transition Fund. Restore more than 400,000 ha of peatland by 2040 and fund 18,000 ha of woodland creation annually by 2029."
    - party: labour
      status: partial
      summary: "Support renewables expansion and remove what they describe as the SNP's block on new nuclear energy in Scotland."
    - party: conservative
      status: partial
      summary: "Back oil and gas industry alongside support for new nuclear power. Less emphasis on accelerating net zero targets."
    - party: libdem
      status: tbc
      summary: null
    - party: greens
      status: committed
      summary: "Get Scotland back on track for net zero by 2045 with a coordinated climate action delivery programme. £600m investment in onshore and offshore wind, wave and solar to lower energy bills."
    - party: reform
      status: opposed
      summary: "Scrap all Scottish Government net zero targets. Fast-track planning for new energy projects including open cast coal mining. Prioritise energy security over climate targets."

- area: Energy
  icon: "⚡"
  id: energy
  policies:
