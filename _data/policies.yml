- area: Cost of Living
  icon: "🛒"
  id: cost-of-living
  policies:
    - party: snp
      status: committed
      summary: "Establish legal price ceilings on a basket of 20–50 essential food items at large supermarkets. Expand childcare to all children from 9 months to end of primary school, 52 weeks a year."
    - party: labour
      status: committed
      summary: "Making life more affordable is the first manifesto priority. Commitments include tax relief for first-time buyers and breakfast clubs to reduce household costs."
    - party: conservative
      status: committed
      summary: "Cut taxes so people keep more of their own money. Raise the income tax threshold and reduce rates to ease cost-of-living pressure."
    - party: libdem
      status: partial
      summary: "Tackling the cost-of-living crisis listed as a campaign focus. Full detail pending manifesto (17 April)."
    - party: greens
      status: committed
