- area: Scottish Independence
  icon: "🏴󠁧󠁢󠁳󠁣󠁴󠁿"
  id: independence
  policies:
    - party: snp
      status: committed
      summary: "An SNP majority is treated as a mandate — based on the 2011 precedent — for powers to be transferred to enable an independence referendum. Independence remains the central long-term goal."
    - party: labour
      status: opposed
      summary: "Opposes independence and a second referendum. Argues Scotland's challenges are best solved within the UK."
    - party: conservative
      status: opposed
      summary: "Strongly opposes independence and any further referendums. Positions the election as a choice between SNP division and Conservative stability."
    - party: libdem
      status: opposed
      summary: "Opposes independence. Supports a federal UK as an alternative to both the status quo and separation."
    - party: greens
      status: committed
      summary: "Supports Scottish independence as part of building a greener, fairer country. Would use Holyrood to advance the case for independence."
    - party: reform
      status: opposed
      summary: "Strongly unionist. Opposes independence and any second referendum."
