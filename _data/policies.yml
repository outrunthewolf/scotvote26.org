# Policy comparison data
# status options:
#   committed   — confirmed manifesto commitment
#   opposed     — explicitly opposed
#   partial     — partial or conditional support
#   tbc         — not yet announced / manifesto not released
#
# summary: plain-English description (null if tbc)
# Party IDs: snp, labour, conservative, libdem, greens, reform

- area: Economy & Jobs
  icon: "💼"
  id: economy
  policies:
    - party: snp
      status: partial
      summary: "Argues only independence can give Scotland full economic control. Spending £36m on walk-in GP services as part of public investment programme."
    - party: labour
      status: committed
      summary: "9,000 new apprenticeships and a new industrial strategy. Plans to replace business rates and create a Scottish Treasury."
    - party: conservative
      status: committed
      summary: "A 'growth test' for every government policy. Enterprise-style zones, cut red tape and lower business rates to attract investment."
    - party: libdem
      status: tbc
      summary: null
    - party: greens
      status: committed
      summary: "Tax wealth and polluting industries to fund public services. Establish regional green skills hubs linking colleges, employers and unions."
    - party: reform
      status: committed
      summary: "Slash quangos to save £7.5bn and return powers to ministers. Cut spending to grow the private sector."

- area: Health & NHS
  icon: "🏥"
  id: health
  policies:
    - party: snp
      status: committed
      summary: "£36m investment in a new network of walk-in GP services. Claims to have halved NHS waiting times for new outpatients. Pledges the NHS will never be privatised."
    - party: labour
      status: committed
      summary: "End the 8am rush for GP appointments and bring back the 'family doctor'. Speed up rollout of an NHS app, invest in AI-enabled scanners and use all available NHS capacity to cut waiting times."
    - party: conservative
      status: committed
      summary: "Guarantee a GP appointment within 48 hours. £350m extra NHS funding above inflation. Bring back recently retired doctors and nurses to reduce waiting lists."
    - party: libdem
      status: partial
      summary: "Campaign priority: ensure everyone can see a GP, dentist or mental health professional in their local community when they need one."
    - party: greens
      status: tbc
      summary: null
    - party: reform
      status: committed
      summary: "NHS to remain free at the point of need. Establish an independent Scottish Healthcare Reform Commission to develop a workforce plan, train more nurses and solve delayed discharge."

