      status: committed
      summary: "Accelerate investment in offshore wind, solar and pumped storage, and establish a ScotWind Wealth Fund for future generations. Will not greenlight any new nuclear power stations, backing renewables as faster, cheaper and safer."
    - party: labour
      status: committed
      summary: "Support renewables expansion. Remove the block on new nuclear energy to diversify Scotland's energy mix."
    - party: conservative
      status: committed
      summary: "Back North Sea oil and gas alongside support for new nuclear power as part of a balanced energy policy."
    - party: libdem
      status: tbc
      summary: null
    - party: greens
      status: committed
      summary: "£600m investment programme in onshore and offshore wind, wave and solar. Zero-carbon energy to lower bills and cut emissions."
    - party: reform
      status: committed
      summary: "Scrap net zero energy targets. Fast-track planning approvals for new energy projects including open cast coal. Back North Sea oil and gas."

