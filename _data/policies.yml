- area: Taxation
  icon: "💰"
  id: taxation
  policies:
    - party: snp
      status: committed
      summary: "No increase to income tax band numbers or rates over the parliament, aiming to simplify the system. From 2028, a mansion tax adding two new bands for properties over £1 million and £2 million, with funds going to local services."
    - party: labour
      status: committed
      summary: "Raise LBTT relief threshold to £200,000 for first-time buyers. Replace business rates with a fairer system."
    - party: conservative
      status: committed
      summary: "Raise the income tax threshold to £13,892 by 2031 (saving ~£250/year). Income tax rate of 19% up to the higher rate. Higher rate threshold raised to £50,270 to match the rest of the UK. Abolish LBTT on primary residences entirely."
    - party: libdem
      status: tbc
      summary: null
    - party: greens
      status: committed
      summary: "Tax wealth and polluting industries to pay for public services. Ask the richest in society to pay more."
    - party: reform
      status: committed
      summary: "Cut Scottish income tax below rest-of-UK rates, funded by closing quangos and cutting £7.5bn in spending."

