title: Scotland Votes 2026
description: Non-partisan manifesto tracker and policy comparison for the Scottish Parliament election, 7 May 2026. All six parties, 13 policy areas, independent IFS analysis.
url: "https://scotvote26.org"
baseurl: ""

author:
  name: Scotland Votes 2026

defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/social-seo.png

markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
  - _config.production.yml

timezone: Europe/London
lang: en-GB

# Election date
election_date: "7 May 2026"

# GitHub repository (used in footer)
github_repo: "https://github.com/outrunthewolf/scotvote26.org"

# Analytics — GoatCounter (privacy-first, no cookie banner needed)
# Sign up free at https://www.goatcounter.com and set your site code below
# Leave blank to disable analytics
goatcounter_code: ""
